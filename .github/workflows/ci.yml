name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Rules-engine tests (golden CBA scenarios)
        run: npm test
      - name: Seed-data validation (schemas + published-total re-sum)
        run: npm run validate:data
      - name: Production build
        run: npm run build
